# For a self-hosted VM (Oracle Cloud Always Free, any VPS).
#   1. put secrets in .env  (see .env.example)
#   2. docker compose up -d --build
#   3. docker compose logs -f
services:
  rqm-nav:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/rqm.db
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - rqm-data:/data        # persistent SQLite — survives redeploys
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  rqm-data:
